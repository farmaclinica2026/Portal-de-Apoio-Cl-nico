<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Shield -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#shieldGrad)" stroke="#1e293b" stroke-width="8" />
  
  <!-- Subtle circular radar lines in background -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#334155" stroke-dasharray="8,8" stroke-width="3" />
  
  <!-- Sleek medical cross with gradient & glow -->
  <g filter="url(#glow)">
    <path d="M 224 128 L 288 128 L 288 224 L 384 224 L 384 288 L 288 288 L 288 384 L 224 384 L 224 288 L 128 288 L 128 224 L 224 224 Z" fill="url(#crossGrad)" />
  </g>

  <!-- Clean intersecting pill/capsule outline on top of the cross -->
  <g transform="translate(256, 256) rotate(45)">
    <!-- Pill left half (solid) -->
    <path d="M -50 -20 A 20 20 0 0 1 -10 -20 L -10 20 A 20 20 0 0 1 -50 20 Z" fill="#ffffff" opacity="0.95" />
    <!-- Pill right half (outline) -->
    <path d="M 50 -20 A 20 20 0 0 0 10 -20 L 10 20 A 20 20 0 0 0 50 20 Z" fill="none" stroke="#ffffff" stroke-width="8" />
    <!-- Pill separator -->
    <line x1="10" y1="-20" x2="10" y2="20" stroke="#000000" stroke-width="4" opacity="0.1" />
  </g>
</svg>
